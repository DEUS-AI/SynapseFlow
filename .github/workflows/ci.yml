name: CI

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install uv
          make install
      - name: Lint
        run: make lint
      - name: Format check
        run: make format --check
      - name: Test
        run: make test

  terraform-plan:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files_url, 'infra/terraform') || true
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Check for infra changes
        id: changes
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^infra/terraform/'; then
            echo "infra_changed=true" >> $GITHUB_OUTPUT
          else
            echo "infra_changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Azure Login
        if: steps.changes.outputs.infra_changed == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Setup Terraform
        if: steps.changes.outputs.infra_changed == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
      - name: Terraform Init
        if: steps.changes.outputs.infra_changed == 'true'
        working-directory: infra/terraform/environments/dev
        run: terraform init
      - name: Terraform Plan
        if: steps.changes.outputs.infra_changed == 'true'
        working-directory: infra/terraform/environments/dev
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
      - name: Comment PR with plan
        if: steps.changes.outputs.infra_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/terraform/environments/dev/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });
